<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --neon:#00e887;
  --neon2:#9b5de5;
  --yellow:#f4c430;
  --orange:#f07030;
  --red:#f0305a;
  --text:#e8eeff;
  --text2:#9aa4c4;
  --muted:rgba(160,175,220,0.45);
  --glass:rgba(255,255,255,0.07);
  --glass-border:rgba(255,255,255,0.12);
  --glass-hover:rgba(255,255,255,0.13);
}
body{
  background:linear-gradient(135deg,#111630 0%,#160f30 45%,#0a1c26 100%);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

.blob{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;}
.blob1{width:500px;height:500px;background:rgba(0,220,130,0.1);top:-80px;left:-80px;}
.blob2{width:600px;height:600px;background:rgba(155,93,229,0.1);bottom:-120px;right:-80px;}
.blob3{width:350px;height:350px;background:rgba(0,160,220,0.08);top:45%;left:38%;}

header{
  padding:2.8rem 1.5rem 1.6rem;
  text-align:center;position:relative;z-index:1;
  border-bottom:1px solid var(--glass-border);
}
.live-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  background:rgba(0,220,130,0.1);border:1px solid rgba(0,220,130,0.25);
  border-radius:999px;padding:.3rem .9rem;
  font-family:'JetBrains Mono',monospace;
  font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--neon);margin-bottom:.9rem;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--neon);box-shadow:0 0 8px var(--neon);
  animation:neon-pulse 2s ease-in-out infinite;
}
@keyframes neon-pulse{0%,100%{box-shadow:0 0 4px var(--neon),0 0 10px var(--neon)}50%{box-shadow:0 0 2px var(--neon)}}

header h1{
  font-family:'Outfit',sans-serif;
  font-weight:900;font-size:clamp(2.2rem,5vw,4rem);
  letter-spacing:-.04em;line-height:1;
  background:linear-gradient(135deg,#e8eeff 20%,var(--neon2) 60%,var(--neon) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.45rem;
}
.sub{font-size:.72rem;color:var(--text2);font-family:'JetBrains Mono',monospace;letter-spacing:.05em;}

.legend{
  display:flex;flex-wrap:wrap;gap:.4rem 1.4rem;justify-content:center;
  padding:.75rem 1rem;border-bottom:1px solid var(--glass-border);
  font-size:.68rem;color:var(--text2);position:relative;z-index:1;
}
.leg{display:flex;align-items:center;gap:.4rem;}
.leg-bar{width:10px;height:3px;border-radius:2px;}

.wrap{
  display:grid;grid-template-columns:1fr 1px 1fr;
  max-width:1240px;margin:0 auto;
  padding:0 .5rem 5rem;position:relative;z-index:1;
}
.div-line{background:var(--glass-border);margin:0 2px;}

.col-header{
  padding:1rem 1rem .5rem;
  font-family:'JetBrains Mono',monospace;
  font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text2);display:flex;align-items:center;gap:.6rem;
}
.pill{font-family:'JetBrains Mono',monospace;font-size:.55rem;padding:.18rem .55rem;border-radius:999px;font-weight:700;letter-spacing:.06em;}
.pill-mod{background:rgba(0,220,130,.12);color:var(--neon);border:1px solid rgba(0,220,130,.3);}
.pill-off{background:rgba(255,255,255,.06);color:var(--text2);border:1px solid var(--glass-border);}

.tbl-head{
  display:grid;grid-template-columns:48px 1fr 44px 36px;
  padding:.38rem 1rem;
  font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid var(--glass-border);border-top:1px solid var(--glass-border);
}

.team-row{
  display:grid;grid-template-columns:48px 1fr 44px 36px;
  align-items:center;padding:.52rem 1rem;
  border-bottom:1px solid rgba(255,255,255,0.05);
  border-left:2px solid transparent;
  cursor:grab;user-select:none;
  transition:background .18s;
  background:var(--glass);
}
.team-row:hover{background:var(--glass-hover);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);}
.team-row.dragging{opacity:.25;cursor:grabbing;transform:scale(.98);}
.team-row.drag-over{background:rgba(0,220,130,0.08);border-bottom-color:rgba(0,220,130,.2);}

.real-row{
  display:grid;grid-template-columns:48px 1fr 44px 36px;
  align-items:center;padding:.52rem 1rem;
  border-bottom:1px solid rgba(255,255,255,0.05);
  border-left:2px solid transparent;
  background:var(--glass);transition:background .18s;
}
.real-row.hl-up{background:rgba(0,220,130,0.07);}
.real-row.hl-down{background:rgba(240,48,90,0.06);}

.zone-cl {border-left-color:var(--neon)!important;box-shadow:inset 2px 0 14px rgba(0,220,130,0.1);}
.zone-el {border-left-color:var(--yellow)!important;box-shadow:inset 2px 0 14px rgba(244,196,48,0.1);}
.zone-ecl{border-left-color:var(--orange)!important;box-shadow:inset 2px 0 14px rgba(240,112,48,0.1);}
.zone-rel{border-left-color:var(--red)!important;box-shadow:inset 2px 0 14px rgba(240,48,90,0.1);}

.pos-cell{display:flex;flex-direction:column;align-items:center;gap:1px;}
.pos-num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.95rem;color:var(--text2);line-height:1;}
.pos-num.top3{color:var(--text);text-shadow:0 0 10px rgba(232,238,255,.2);}
.delta{font-family:'JetBrains Mono',monospace;font-size:.52rem;font-weight:700;}
.delta-up{color:var(--neon);text-shadow:0 0 5px var(--neon);}
.delta-down{color:var(--red);text-shadow:0 0 5px var(--red);}
.delta-same{color:transparent;}

.team-info{display:flex;align-items:center;gap:.6rem;min-width:0;}
.logo{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:.45rem;font-weight:700;flex-shrink:0;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:box-shadow .2s;
}
.tname{font-weight:600;font-size:.88rem;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.team-row.moved .tname{color:var(--neon);text-shadow:0 0 8px rgba(0,220,130,.35);}

.pts{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.92rem;color:var(--text);text-align:center;}
.stat{text-align:center;font-size:.78rem;color:var(--text2);}
.handle{text-align:center;font-size:.7rem;color:rgba(255,255,255,.1);}
.team-row:hover .handle{color:var(--text2);}

@keyframes slideIn{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:none}}
.team-row,.real-row{animation:slideIn .22s ease both;}

.reset-btn{
  position:fixed;bottom:1.3rem;right:1.3rem;
  background:rgba(155,93,229,.12);border:1px solid rgba(155,93,229,.3);
  color:var(--neon2);font-family:'JetBrains Mono',monospace;
  font-size:.65rem;letter-spacing:.08em;border-radius:8px;padding:.48rem .9rem;
  cursor:pointer;transition:background .2s,box-shadow .2s;z-index:100;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.reset-btn:hover{background:rgba(155,93,229,.22);box-shadow:0 0 16px rgba(155,93,229,.2);}

.toast-wrap{position:fixed;bottom:1.3rem;left:50%;transform:translateX(-50%);z-index:999;pointer-events:none;}
.toast{
  background:rgba(30,40,70,.85);border:1px solid rgba(0,220,130,.3);color:var(--neon);
  border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.06em;
  padding:.45rem 1rem;opacity:0;transition:opacity .3s;white-space:nowrap;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.toast.show{opacity:1;}

@media(max-width:660px){
  .wrap{grid-template-columns:1fr;}
  .div-line{height:1px;width:100%;margin:0;}
}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<header>
  <div class="live-badge"><span class="live-dot"></span>Stagione 2025/26 · Giornata 28</div>
  <h1>Serie A</h1>
  <p class="sub">// trascina per riordinare · confronta con la classifica ufficiale</p>
</header>

<div class="legend">
  <span class="leg"><span class="leg-bar" style="background:var(--neon);box-shadow:0 0 4px var(--neon)"></span>Champions (1–4)</span>
  <span class="leg"><span class="leg-bar" style="background:var(--yellow)"></span>Europa League (5)</span>
  <span class="leg"><span class="leg-bar" style="background:var(--orange)"></span>Conference (6)</span>
  <span class="leg"><span class="leg-bar" style="background:var(--red)"></span>Retrocessione (18–20)</span>
</div>

<div class="wrap">
  <div>
    <div class="col-header">La tua classifica <span class="pill pill-mod">✦ live</span></div>
    <div class="tbl-head"><div>#/Δ</div><div>Squadra</div><div style="text-align:center">Pts</div><div style="text-align:center">⠿</div></div>
    <div id="custom-standings"></div>
  </div>
  <div class="div-line"></div>
  <div>
    <div class="col-header">Classifica reale <span class="pill pill-off">ufficiale</span></div>
    <div class="tbl-head"><div>#</div><div>Squadra</div><div style="text-align:center">Pts</div><div style="text-align:center">G</div></div>
    <div id="real-standings"></div>
  </div>
</div>

<button class="reset-btn" onclick="resetStandings()">↺ reset</button>
<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
const DEFAULT_TEAMS=[
  {name:"Inter",abbr:"INT",color:"#2288cc",pts:67,g:28},
  {name:"Milan",abbr:"MIL",color:"#e03030",pts:60,g:28},
  {name:"Napoli",abbr:"NAP",color:"#1ab0d0",pts:56,g:28},
  {name:"Como",abbr:"COM",color:"#7799aa",pts:51,g:28},
  {name:"Roma",abbr:"ROM",color:"#e06020",pts:51,g:28},
  {name:"Juventus",abbr:"JUV",color:"#cccccc",pts:50,g:28},
  {name:"Atalanta",abbr:"ATA",color:"#3a6acc",pts:46,g:28},
  {name:"Bologna",abbr:"BOL",color:"#cc2a3a",pts:39,g:28},
  {name:"Sassuolo",abbr:"SAS",color:"#22bb55",pts:38,g:28},
  {name:"Lazio",abbr:"LAZ",color:"#5ab8d8",pts:37,g:28},
  {name:"Udinese",abbr:"UDI",color:"#aaaaaa",pts:36,g:28},
  {name:"Parma",abbr:"PAR",color:"#3348aa",pts:34,g:28},
  {name:"Genoa",abbr:"GEN",color:"#cc3333",pts:30,g:28},
  {name:"Cagliari",abbr:"CAG",color:"#4a6888",pts:30,g:28},
  {name:"Torino",abbr:"TOR",color:"#993030",pts:30,g:28},
  {name:"Lecce",abbr:"LEC",color:"#ddaa00",pts:27,g:28},
  {name:"Fiorentina",abbr:"FIO",color:"#9b5de5",pts:25,g:28},
  {name:"Cremonese",abbr:"CRE",color:"#dd2222",pts:24,g:28},
  {name:"Verona",abbr:"VER",color:"#2244aa",pts:18,g:28},
  {name:"Pisa",abbr:"PIS",color:"#2244cc",pts:15,g:28},
];
const REAL=JSON.parse(JSON.stringify(DEFAULT_TEAMS));
let custom=JSON.parse(JSON.stringify(DEFAULT_TEAMS));
let dragSrc=null;

function zone(p){if(p<=4)return'zone-cl';if(p===5)return'zone-el';if(p===6)return'zone-ecl';if(p>=18)return'zone-rel';return'';}
function realPos(n){return REAL.findIndex(t=>t.name===n)+1;}
function deltaMap(){const m={};custom.forEach((t,i)=>m[t.name]=(i+1)-realPos(t.name));return m;}

function renderCustom(){
  const el=document.getElementById('custom-standings');el.innerHTML='';
  custom.forEach((t,i)=>{
    const pos=i+1,rPos=realPos(t.name),diff=rPos-pos,z=zone(pos);
    let dh=diff>0?`<span class="delta delta-up">▲${diff}</span>`:diff<0?`<span class="delta delta-down">▼${Math.abs(diff)}</span>`:`<span class="delta delta-same">—</span>`;
    const row=document.createElement('div');
    row.className=`team-row ${z}${diff!==0?' moved':''}`;
    row.draggable=true;row.dataset.idx=i;row.style.animationDelay=`${i*16}ms`;
    row.innerHTML=`
      <div class="pos-cell"><span class="pos-num ${pos<=3?'top3':''}">${pos}</span>${dh}</div>
      <div class="team-info">
        <div class="logo" style="background:${t.color}20;border:1px solid ${t.color}55;color:${t.color}"><span>${t.abbr}</span></div>
        <span class="tname">${t.name}</span>
      </div>
      <div class="pts">${t.pts}</div>
      <div class="handle">⠿</div>`;
    row.addEventListener('dragstart',e=>{dragSrc=i;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');document.querySelectorAll('.team-row').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.team-row').forEach(r=>r.classList.remove('drag-over'));row.classList.add('drag-over');});
    row.addEventListener('drop',e=>{
      e.preventDefault();const target=parseInt(row.dataset.idx);
      if(dragSrc===null||dragSrc===target)return;
      const moved=custom.splice(dragSrc,1)[0];custom.splice(target,0,moved);
      dragSrc=null;renderCustom();renderReal();showToast('// classifica aggiornata');
    });
    el.appendChild(row);
  });
}

function renderReal(){
  const el=document.getElementById('real-standings');el.innerHTML='';
  const dm=deltaMap();
  REAL.forEach((t,i)=>{
    const pos=i+1,z=zone(pos),d=dm[t.name];
    let hl=d<0?'hl-up':d>0?'hl-down':'';
    let ah=d<0?`<span class="delta delta-up" style="font-size:.52rem">▲${Math.abs(d)}</span>`:d>0?`<span class="delta delta-down" style="font-size:.52rem">▼${d}</span>`:`<span class="delta delta-same" style="font-size:.52rem">—</span>`;
    const row=document.createElement('div');
    row.className=`real-row ${z} ${hl}`;row.style.animationDelay=`${i*16}ms`;
    row.innerHTML=`
      <div class="pos-cell"><span class="pos-num ${pos<=3?'top3':''}">${pos}</span>${ah}</div>
      <div class="team-info">
        <div class="logo" style="background:${t.color}20;border:1px solid ${t.color}55;color:${t.color}"><span>${t.abbr}</span></div>
        <span class="tname">${t.name}</span>
      </div>
      <div class="pts">${t.pts}</div>
      <div class="stat">${t.g}</div>`;
    el.appendChild(row);
  });
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}
function resetStandings(){
  custom=JSON.parse(JSON.stringify(DEFAULT_TEAMS));renderCustom();renderReal();showToast('// reset completato');
}
renderCustom();renderReal();
</script>
</body>
</html>
